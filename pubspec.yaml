name: meu_app_rastreador
description: "Sistema de Rastreio BusTrace"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.1.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  http: ^1.2.0
  geolocator: ^11.0.0
  flutter_background_service: ^5.1.0
  flutter_background_service_android: ^6.1.1
  flutter_local_notifications: ^17.0.0
  shared_preferences: ^2.5.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0D47A1" # Azul escuro (combina com seu app)
  adaptive_icon_foreground: "assets/icon/icon.png"